<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUMRAN STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #000; --card: #fff; --tg: #0088cc; --accent: #ff3b30; --gold: #FFD700; }
        
        html.loading, body.loading { 
            overflow: hidden !important; 
            height: 100% !important; 
            position: fixed; 
            width: 100%;
            touch-action: none; 
        }

        html.modal-open, body.modal-open { 
            overflow: hidden !important; 
        }

        /* --- LUXURY SPLASH SCREEN START --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }

        .splash-content { text-align: center; perspective: 1000px; }

        .welcome-msg { 
            font-size: 10px; color: #666; letter-spacing: 8px; 
            text-transform: uppercase; margin-bottom: 10px;
            opacity: 0; animation: luxuryFadeDown 1s ease forwards;
        }

        .splash-logo { 
            font-family: 'Playfair Display', serif; font-size: 42px; 
            letter-spacing: 12px; font-weight: 700; font-style: italic;
            text-transform: uppercase; line-height: 1.1; margin-bottom: 25px;
            
            /* Metallic Gold Gradient */
            background: linear-gradient(
                to right, 
                #bf953f 0%, 
                #fcf6ba 25%, 
                #b38728 50%, 
                #fcf6ba 75%, 
                #bf953f 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            opacity: 0;
            filter: drop-shadow(0 0 15px rgba(184, 134, 11, 0.3));
            animation: 
                luxuryZoom 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                shineSweep 4s linear infinite;
            animation-delay: 0.3s, 0s;
        }

        .splash-slogan {
            font-size: 10px; color: #bf953f; 
            letter-spacing: 4px; text-transform: uppercase; font-weight: 400;
            opacity: 0; animation: luxuryFadeUp 1.2s ease forwards; 
            animation-delay: 1.2s;
        }
        
        .splash-exit { opacity: 0; visibility: hidden; pointer-events: none; }

        /* LUXURY ANIMATIONS */
        @keyframes luxuryFadeDown {
            from { opacity: 0; transform: translateY(-20px); letter-spacing: 15px; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 8px; }
        }

        @keyframes luxuryFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes luxuryZoom {
            from { opacity: 0; transform: scale(0.9) translateZ(-50px); }
            to { opacity: 1; transform: scale(1) translateZ(0); }
        }

        @keyframes shineSweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        /* --- LUXURY SPLASH SCREEN END --- */

        #added-toast {
            position: fixed; top: 20px; right: -400px; 
            visibility: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; padding: 15px 25px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            z-index: 5000; font-weight: 600; font-size: 13px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        #added-toast.show { right: 20px; visibility: visible; }
        .toast-icon { background: var(--gold); color: black; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin:0; background: var(--bg); color: white; 
            overflow-x: hidden; position: relative; min-height: 100vh;
        }
        #motion-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("IMG_8765.jpeg"); 
            background-repeat: no-repeat; background-position: center; 
            background-size: cover; opacity: 0.85; z-index: -1;
            filter: brightness(0.6); 
        }
        header { 
            background: rgba(0,0,0,0.9); padding: 18px; border-bottom: 1px solid #333; 
            position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .header-logo { height: 35px; border-radius: 5px; vertical-align: middle; }
        .brand-name { font-size: 15px; letter-spacing: 2px; font-weight: 900; margin-left: 10px; }
        
        .variant-section { margin-bottom: 15px; }
        .variant-label { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .variant-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;
            scrollbar-width: none; -ms-overflow-style: none;
            scroll-snap-type: x mandatory;
        }
        .variant-scroll::-webkit-scrollbar { display: none; }
        .variant-item { 
            flex: 0 0 65px; height: 65px; background: none; border-radius: 8px; border: 2px solid transparent; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;
            scroll-snap-align: start; transition: 0.2s; padding: 0 !important;
        }
        .variant-item img { width: 100%; height: 100%; object-fit: cover; }
        .variant-item span { display: none !important; }
        .variant-item.active { border-color: var(--gold); }

        @media (min-width: 768px) {
            .modal-content { max-width: 600px !important; width: 50% !important; }
            .product-card { flex: 0 0 250px !important; }
            .img-area { height: 300px !important; }
            .category-title { font-size: 28px !important; margin-bottom: 30px; }
            .brand-name { font-size: 24px !important; }
            .header-logo { height: 50px !important; }
        }

        .promo-bar { 
            background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; padding: 12px; 
            font-weight: 900; text-align: center; border-bottom: 1px solid #222;
        }
        .search-container { padding: 15px; background: rgba(0,0,0,0.6); }
        #search-input { 
            width: 100%; padding: 12px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(34,34,34,0.9); color: white; font-size: 16px; box-sizing: border-box; text-align: center;
            outline: none;
        }
        
        .category-section { padding: 35px 0 0 0; text-align: left; position: relative; z-index: 1; }
        .category-title { 
            font-family: 'Playfair Display', serif; font-size: 19px; font-style: italic;
            font-weight: 700; color: var(--gold); margin-bottom: 20px; letter-spacing: 1px; text-align: center;
        }
        .scroll-wrapper { display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px 30px 20px; scrollbar-width: none; }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .product-card { 
            flex: 0 0 180px; background: var(--card); border-radius: 15px; color: black; 
            overflow: hidden; position: relative; box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease; cursor:pointer;
        }
        .img-area { height: 220px; background: #f9f9f9; overflow: hidden; }
        .img-area img { width: 100%; height: 100%; object-fit: cover; aspect-ratio: 1/1; }
        
        .info-area { padding: 12px; }
        .info-area h3 { font-size: 11px; margin: 0; color: #444; font-weight: bold; height: 30px; overflow: hidden; }
        .new-p { font-weight: 900; font-size: 14px; color: #000; margin-top: 5px; }
        
        .tg-float { position: fixed; bottom: 20px; right: 20px; background: var(--tg); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: white; color: black; width: 60px; height: 60px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cart-count { position: absolute; top: 0; right: 0; background: var(--accent); color: white; font-size: 12px; padding: 4px 8px; border-radius: 50%; font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: #1a1a1a; color: white; margin: 20px auto; padding: 25px; width: 85%; max-width: 380px; border-radius: 25px; border: 1px solid #333; position: relative; }
        .btn { width: 100%; padding: 18px; background: white; color: black; border: none; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        .order-input, #size-box { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        .payment-info { background: #222; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 13px; border-left: 4px solid #0088cc; color: #ccc; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .remove-btn { background:#ff3b30; color:white; padding: 6px 12px; border:none; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

        @media (max-width: 767px) {
            .modal-content { margin: 9px auto; width: 93%; padding: 15px; } 
            #modal-img { max-height: 250px !important; object-fit: contain !important; margin-bottom: 10px !important; }
            .modal-price { font-size: 18px; margin: 5px 0; }
            .variant-section { margin-bottom: 10px; }
            .btn { padding: 14px; margin-top: 10px; }
        }
    </style>
</head>

</html>
