<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUMRAN</title>
    <style>
        /* LUXURY DARK THEME */
        :root { --bg: #000; --card: #fff; --accent: #d9534f; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; background: var(--bg); color: white; text-align:center; }
        
        /* HEADER WITH LOGO & TITLE */
        header { 
            background: black; padding: 15px; border-bottom: 1px solid #222; position: sticky; 
            top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .header-logo { height: 45px; width: auto; border-radius: 5px; }
        .brand-name { font-size: 24px; letter-spacing: 6px; text-transform: uppercase; font-weight: bold; color: white; }
        
        .promo-bar { background: #111; font-size: 11px; padding: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }

        /* 2-COLUMN GRID */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .product { background: var(--card); border-radius: 8px; color: black; position: relative; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }

        /* IMAGE SLIDER (SWIPEABLE) */
        .image-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 180px; background: #eee; }
        .image-slider::-webkit-scrollbar { display: none; }
        .image-slider img { flex: 0 0 100%; width: 100%; object-fit: cover; scroll-snap-align: start; }

        .badge-sale { position: absolute; top: 10px; left: 10px; background: black; color: white; padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; z-index: 5; }

        .product-info { padding: 10px; text-align: left; }
        .product h3 { font-size: 12px; margin: 0; text-transform: uppercase; color: #333; }
        .price-row { margin-top: 5px; }
        .new-price { font-weight: bold; font-size: 14px; color: #000; }
        .old-price { color: #999; text-decoration: line-through; font-size: 11px; margin-left: 5px; }

        /* POP-UP MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: white; color: black; margin: 15% auto; padding: 25px; width: 85%; max-width: 350px; border-radius: 20px; text-align: left; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close { float: right; font-size: 24px; cursor: pointer; color: #999; font-weight: bold; }
        .order-btn { width: 100%; padding: 15px; background: black; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }

        /* PAYMENT & CONTACT INFO */
        #payment-info { display: none; background: #fdf2f2; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #fababa; }
        .shipping-tag { color: var(--accent); font-weight: bold; font-size: 13px; margin: 10px 0; text-align: center; border: 1px dashed #fababa; padding: 8px; border-radius: 8px; }
        .copy-btn { background: #eee; border: 1px solid #ccc; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .contact-link { color: black; font-weight: bold; text-decoration: none; border-bottom: 2px solid black; display: inline-block; margin: 10px 10px 0 0; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <img src="IMG_8765.jpeg" alt="OUMRAN Logo" class="header-logo">
    <span class="brand-name">OUMRAN</span>
</header>

<div class="promo-bar">Premium Quality • 14-20 Day Shipping</div>

<div class="product-grid">
    <div class="product" onclick="openSpace('Premium Hoodie', '$35', 'Heavyweight cotton with custom OUMRAN embroidery.')">
        <div class="badge-sale">SALE</div>
        <div class="image-slider">
            <img src="https://via.placeholder.com/400x400/eee?text=Hoodie+Front" alt="1">
            <img src="https://via.placeholder.com/400x400/ddd?text=Hoodie+Back" alt="2">
        </div>
        <div class="product-info">
            <h3>Premium Hoodie</h3>
            <div class="price-row">
                <span class="new-price">$35</span> <span class="old-price">$50</span>
            </div>
        </div>
    </div>

    <div class="product" onclick="openSpace('Urban Sneakers', '$55', 'Hand-stitched leather for maximum comfort.')">
        <div class="badge-sale">SALE</div>
        <div class="image-slider">
            <img src="https://via.placeholder.com/400x400/eee?text=Shoe+Side" alt="1">
            <img src="https://via.placeholder.com/400x400/ddd?text=Shoe+Bottom" alt="2">
        </div>
        <div class="product-info">
            <h3>Urban Sneakers</h3>
            <div class="price-row">
                <span class="new-price">$55</span> <span class="old-price">$80</span>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSpace()">×</span>
    <h2 id="m-title" style="margin-top:0; font-size: 20px;">Product Name</h2>
    <p id="m-desc" style="color:#666; font-size: 13px;"></p>
    
    <label style="font-size: 11px; font-weight: bold;">SELECT SIZE</label>
    <select id="size" style="width:100%; padding:12px; margin-top:5px; border-radius:8px; border: 1px solid #ddd;">
        <option>Small (S)</option><option>Medium (M)</option><option>Large (L)</option>
        <option>XL</option><option>41 (EU)</option><option>42 (EU)</option><option>43 (EU)</option>
    </select>

    <div class="shipping-tag">🚚 Estimated Shipping: 14 to 20 Days</div>
    
    <button id="order-now-btn" class="order-btn" onclick="sendOrderIntent()">Order Now</button>

    <div id="payment-info">
        <p style="font-weight:bold; color: #d9534f;">Order Notification Sent!</p>
        <p style="font-size: 14px; margin-bottom: 5px;"><strong>Payment (Telebirr/CBE):</strong></p>
        <p style="margin: 5px 0;">
           <span id="p1" style="font-weight: 800;">0939620004</span> 
           <button class="copy-btn" onclick="copyNum('p1')">COPY</button>
        </p>
        <p style="margin: 5px 0;">
           <span id="p2" style="font-weight: 800;">0940028820</span> 
           <button class="copy-btn" onclick="copyNum('p2')">COPY</button>
        </p>

        <p style="font-size: 14px; margin: 15px 0 5px 0;"><strong>Message us on Telegram:</strong></p>
        <a href="https://t.me/OUMER_FETE" class="contact-link" target="_blank">@OUMER_FETE</a>
        <a href="https://t.me/afran_ismael" class="contact-link" target="_blank">@afran_ismael</a>
    </div>
  </div>
</div>

<script>
let currentProduct = "";

function openSpace(name, price, desc) {
    currentProduct = name;
    document.getElementById("m-title").innerText = name + " - " + price;
    document.getElementById("m-desc").innerText = desc;
    document.getElementById("productModal").style.display = "block";
    document.getElementById("payment-info").style.display = "none";
    document.getElementById("order-now-btn").style.display = "block";
}

function sendOrderIntent() {
    let selectedSize = document.getElementById("size").value;
    
    // Notify your phone via Formspree
    fetch("https://formspree.io/f/xkoqwjke", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Store: "OUMRAN", Product: currentProduct, Size: selectedSize })
    });

    document.getElementById("payment-info").style.display = "block";
    document.getElementById("order-now-btn").style.display = "none";
    alert("Notification sent to OUMRAN Store!");
}

function copyNum(id) {
    var num = document.getElementById(id).innerText;
    navigator.clipboard.writeText(num).then(() => {
        alert("Number copied: " + num);
    });
}

function closeSpace() { document.getElementById("productModal").style.display = "none"; }
window.onclick = function(event) { if (event.target == document.getElementById("productModal")) { closeSpace(); } }
</script>

</body>
</html>
