<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OUMRAN STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#000; --card:#fff; --tg:#0088cc; --accent:#ff3b30; --gold:#FFD700; }

/* HERO SECTION */
.hero {
    width: 100%;
    height: 60vh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
                url("IMG_8765.jpeg") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}
.hero-content h1 {
    font-family:'Playfair Display',serif;
    font-size:42px;
    letter-spacing:4px;
}
.hero-content p {
    color:#ccc;
    font-size:14px;
    margin:10px 0 20px;
}
.hero-content button {
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:var(--gold);
    color:black;
    font-weight:900;
    cursor:pointer;
    transition:.3s;
}
.hero-content button:hover { transform:scale(1.05); }

/* ORIGINAL */
body {
    font-family:'Inter',sans-serif;
    margin:0;
    background:var(--bg);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.site-wrapper { width:100%; max-width:1400px; }

/* HEADER UPGRADE */
header {
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
    padding:18px;
    text-align:center;
}

.brand-name { font-size:15px; letter-spacing:2px; font-weight:900; }

/* PRODUCT */
.product-card {
    flex:0 0 180px;
    background:white;
    border-radius:15px;
    color:black;
    overflow:hidden;
    box-shadow:0 12px 25px rgba(0,0,0,0.5);
    transition:0.3s;
}
.product-card:hover {
    transform:translateY(-8px) scale(1.02);
}

.img-area { height:220px; }
.img-area img { width:100%; height:100%; object-fit:cover; }

.info-area { padding:12px; }
.info-area h3 { font-size:11px; margin:0; }
.new-p { font-weight:900; font-size:14px; }

/* BUTTON */
.btn {
    width:100%;
    padding:18px;
    background:white;
    color:black;
    border:none;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover {
    background:var(--gold);
    color:black;
}

/* CATEGORY */
.category-section { margin-top:30px; }
.category-title {
    font-family:'Playfair Display',serif;
    font-size:19px;
    color:var(--gold);
    text-align:center;
}

.scroll-wrapper {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:20px;
}

/* KEEP REST SAME */
</style>
</head>

<body>

<header>
    <span class="brand-name">OUMRAN STORE</span>
</header>

<!-- HERO ADDED -->
<section class="hero">
    <div class="hero-content">
        <h1>OUMRAN STORE</h1>
        <p>Premium Streetwear in Addis Ababa</p>
        <button onclick="document.getElementById('store-main').scrollIntoView({behavior:'smooth'})">
            Shop Now
        </button>
    </div>
</section>

<main id="store-main">

<!-- KEEP YOUR ORIGINAL PRODUCTS EXACTLY -->
<!-- (I DID NOT TOUCH THEM) -->

</main>

</body>
</html>
