<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUMRAN ONLINE STORE</title>
    <style>
        /* LUXURY DARK THEME */
        :root { --bg: #000; --card: #fff; --accent: #d9534f; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; background: var(--bg); color: white; text-align:center; overflow-x: hidden; }
        
        /* HEADER WITH LOGO & NEW TITLE */
        header { 
            background: black; padding: 15px; border-bottom: 1px solid #222; position: sticky; 
            top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: fadeInDown 0.8s ease-out;
        }
        .header-logo { height: 40px; width: auto; border-radius: 5px; }
        .brand-name { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; color: white; }
        
        .promo-bar { background: #111; font-size: 10px; padding: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }

        /* 2-COLUMN GRID WITH ENTRANCE ANIMATION */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; max-width: 1000px; margin: 0 auto; }
        
        .product { 
            background: var(--card); border-radius: 12px; color: black; position: relative; overflow: hidden; 
            display: flex; flex-direction: column; cursor: pointer;
            transition: transform 0.3s ease;
            animation: fadeInUp 0.6s ease backwards;
        }
        .product:active { transform: scale(0.95); }

        /* IMAGE SLIDER */
        .image-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 180px; background: #f4f4f4; }
        .image-slider::-webkit-scrollbar { display: none; }
        .image-slider img { flex: 0 0 100%; width: 100%; object-fit: cover; scroll-snap-align: start; }

        .badge-sale { position: absolute; top: 10px; left: 10px; background: black; color: white; padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; z-index: 5; }

        .product-info { padding: 10px; text-align: left; }
        .product h3 { font-size: 12px; margin: 0; text-transform: uppercase; color: #333; }
        .price-row { margin-top: 5px; }
        .new-price { font-weight: bold; font-size: 14px; color: #000; }
        .old-price { color: #999; text-decoration: line-through; font-size: 11px; margin-left: 5px; }

        /* ANIMATED MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { 
            background: white; color: black; margin: 10% auto; padding: 25px; width: 85%; max-width: 350px; 
            border-radius: 25px; text-align: left; 
            animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .close { float: right; font-size: 28px; cursor: pointer; color: #bbb; font-weight: bold; }
        .order-btn { width: 100%; padding: 16px; background: black; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .order-btn:hover { background: #333; }

        /* CONTACT REVEAL */
        #payment-info { display: none; background: #fff5f5; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ffebeb; animation: fadeIn 0.5s ease; }
        .copy-btn { background: #000; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; margin-left: 8px; }

        /* KEYFRAMES */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* STAGGERED GRID REVEAL */
        .product:nth-child(1) { animation-delay: 0.1s; }
        .product:nth-child(2) { animation-delay: 0.2s; }
    </style>
</head>
<body>

<header>
    <img src="IMG_8765.jpeg" alt="Logo" class="header-logo">
    <span class="brand-name">OUMRAN ONLINE STORE📲</span>
</header>

<div class="promo-bar">Premium Quality • 14-20 Day Shipping</div>

<div class="product-grid">
    <div class="product" onclick="openSpace('OUMRAN Street Hoodie', '$35', 'Luxury heavyweight cotton with signature embroidery.')">
        <div class="badge-sale">SALE</div>
        <div class="image-slider">
            <img src="https://via.placeholder.com/400x400/eee?text=Photo+1" alt="1">
            <img src="https://via.placeholder.com/400x400/ddd?text=Photo+2" alt="2">
        </div>
        <div class="product-info">
            <h3>Street Hoodie</h3>
            <div class="price-row"><span class="new-price">$35</span> <span class="old-price">$55</span></div>
        </div>
    </div>

    <div class="product" onclick="openSpace('OUMRAN Leather Kicks', '$60', 'Genuine leather construction for the modern lifestyle.')">
        <div class="badge-sale">SALE</div>
        <div class="image-slider">
            <img src="https://via.placeholder.com/400x400/eee?text=Photo+1" alt="1">
            <img src="https://via.placeholder.com/400x400/ddd?text=Photo+2" alt="2">
        </div>
        <div class="product-info">
            <h3>Leather Kicks</h3>
            <div class="price-row"><span class="new-price">$60</span> <span class="old-price">$90</span></div>
        </div>
    </div>
</div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSpace()">×</span>
    <h2 id="m-title" style="margin:0 0 10px 0; font-size: 20px;">Product</h2>
    <p id="m-desc" style="color:#666; font-size: 13px; margin-bottom: 20px;"></p>
    
    <label style="font-size: 11px; font-weight: bold; color: #999;">SELECT SIZE</label>
    <select id="size" style="width:100%; padding:14px; margin-top:5px; border-radius:12px; border: 1px solid #eee; background: #f9f9f9;">
        <option>S</option><option>M</option><option>L</option><option>XL</option>
        <option>41 (EU)</option><option>42 (EU)</option><option>43 (EU)</option>
    </select>
    
    <button id="order-now-btn" class="order-btn" onclick="sendOrderIntent()">Order Now</button>

    <div id="payment-info">
        <p style="font-weight:bold; color: #d9534f; margin-top:0;">Notification Sent! ✅</p>
        <p style="font-size: 13px;"><strong>Pay via Telebirr/CBE:</strong></p>
        <p style="font-size: 15px;">0939620004 <button class="copy-btn" onclick="copyNum('0939620004')">COPY</button></p>
        <p style="font-size: 15px;">0940028820 <button class="copy-btn" onclick="copyNum('0940028820')">COPY</button></p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <p style="font-size: 13px;"><strong>Send screenshot to Telegram:</strong></p>
        <a href="https://t.me/OUMER_FETE" style="color:black; font-weight:bold; text-decoration:none;">@OUMER_FETE</a><br>
        <a href="https://t.me/afran_ismael" style="color:black; font-weight:bold; text-decoration:none;">@afran_ismael</a>
    </div>
  </div>
</div>

<script>
function openSpace(name, price, desc) {
    document.getElementById("m-title").innerText = name + " - " + price;
    document.getElementById("m-desc").innerText = desc;
    document.getElementById("productModal").style.display = "block";
    document.getElementById("payment-info").style.display = "none";
    document.getElementById("order-now-btn").style.display = "block";
}

function sendOrderIntent() {
    fetch("https://formspree.io/f/xkoqwjke", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Store: "OUMRAN", Product: document.getElementById("m-title").innerText })
    });
    document.getElementById("payment-info").style.display = "block";
    document.getElementById("order-now-btn").style.display = "none";
}

function copyNum(num) {
    navigator.clipboard.writeText(num);
    alert("Number copied!");
}

function closeSpace() { document.getElementById("productModal").style.display = "none"; }
window.onclick = function(event) { if (event.target == document.getElementById("productModal")) { closeSpace(); } }
</script>

</body>
</html>
